version: 2
updates:
  # Rust dependencies - Weekly updates with conservative grouping
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5

    # Group related dependencies to reduce PR noise
    groups:
      # Development and testing dependencies
      development-dependencies:
        patterns:
          - "criterion"
          - "tracing-*"
          - "tokio-test"
          - "anyhow"
          - "thiserror"
        update-types:
          - "minor"
          - "patch"

      # Kubernetes client dependencies
      kubernetes-dependencies:
        patterns:
          - "kube*"
          - "k8s-openapi"
        update-types:
          - "patch"

      # HTTP/networking stack
      http-stack:
        patterns:
          - "hyper*"
          - "tokio*"
          - "rustls*"
        update-types:
          - "patch"

    labels:
      - "dependencies"
      - "rust"

    commit-message:
      prefix: "deps"
      include: "scope"

    reviewers:
      - "yair"

  # GitHub Actions - Monthly updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
