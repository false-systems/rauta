# Oracle K8s Job — runs the oracle test suite against a live RAUTA in-cluster
#
# Prerequisites:
#   1. RAUTA deployed in the 'rauta-system' namespace (see manifests/)
#   2. Oracle image built: docker build -f eval/k8s/Dockerfile -t false-systems/rauta-oracle .
#
# Usage:
#   kubectl apply -f eval/k8s/oracle-job.yaml
#   kubectl logs -f job/rauta-oracle -n rauta-system
#
# Configure endpoints via env vars if your deployment differs.

apiVersion: batch/v1
kind: Job
metadata:
  name: rauta-oracle
  namespace: rauta-system
  labels:
    app.kubernetes.io/name: rauta-oracle
    app.kubernetes.io/component: eval
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rauta-oracle
    spec:
      restartPolicy: Never
      containers:
        - name: oracle
          image: false-systems/rauta-oracle:latest
          imagePullPolicy: Always
          env:
            - name: RAUTA_PROXY_ENDPOINT
              value: "http://rauta-metrics.rauta-system.svc:8080"
            - name: RAUTA_ADMIN_ENDPOINT
              value: "http://rauta-metrics.rauta-system.svc:9091"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
